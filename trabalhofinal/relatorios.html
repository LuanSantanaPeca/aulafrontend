<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios</title>
    <link href="./css/style.css" rel="stylesheet"></link>
    <link href="./css/navbar.css" rel="stylesheet"></link>
</head>
<body>
    <header>
        <h1>Portal Academico</h1>
        <h3>Faculdade de Tecnologia</h3>
        <div class="navbar" id="navbar"></div>
    </header>

    <div class="container">
        <div class="card relatorios-page">
            <h2 class="titulo">Relatórios Acadêmicos</h2>

            <div class="relatorio-dropdown">
                <button type="button" class="relatorio-dropdown-header">
                    Estatística Geral
                    <span class="relatorio-dropdown-icon">▼</span>
                </button>
                <div class="relatorio-dropdown-content">
                    <ul class="relatorio-list" id="estatistica-geral"></ul>
                </div>
            </div>

            <div class="relatorio-dropdown">
                <button type="button" class="relatorio-dropdown-header">
                    Relatório de Curso
                    <span class="relatorio-dropdown-icon">▼</span>
                </button>
                <div class="relatorio-dropdown-content">
                    <ul class="relatorio-list" id="relatorio-curso"></ul>
                </div>
            </div>

            <div class="relatorio-dropdown">
                <button type="button" class="relatorio-dropdown-header">
                    Relatório de Desempenho Acadêmico
                    <span class="relatorio-dropdown-icon">▼</span>
                </button>
                <div class="relatorio-dropdown-content">
                    <ul class="relatorio-list" id="desempenho-academico"></ul>
                </div>
            </div>

            <div class="relatorio-dropdown">
                <button type="button" class="relatorio-dropdown-header">
                    Relatório – Top 5
                    <span class="relatorio-dropdown-icon">▼</span>
                </button>
                <div class="relatorio-dropdown-content">
                    <div id="top-5"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/navbar.js"></script>
    <script type="module" src="js/relatorios.js"></script>
</body>
</html>
